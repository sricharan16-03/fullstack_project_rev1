<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — EventX</title>
    <meta name="description" content="Login or create your EventX account to book tickets." />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="nav-logo">🎫 EventX</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="events.html">Events</a></li>
        </ul>
    </nav>

    <div class="auth-page">
        <div class="auth-card">

            <div class="auth-logo">
                <div class="logo-icon">🎫</div>
                <h1>Login</h1>
                <p>Sign in to book and manage tickets</p>
            </div>


            <div class="auth-tabs">
                <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</div>
                <div class="auth-tab" id="tabRegister" onclick="switchTab('register')">Register</div>
            </div>


            <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required />
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required />
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Sign In →</button>

            </form>

            <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" class="form-control" placeholder="John Doe" required />
                </div>
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="you@example.com" required />
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" class="form-control" placeholder="Min. 6 characters"
                        minlength="6" required />
                </div>
                <div class="form-group">
                    <label for="regConfirm">Confirm Password</label>
                    <input type="password" id="regConfirm" class="form-control" placeholder="Repeat password"
                        required />
                </div>
                <div class="admin-check-group" onclick="document.getElementById('regAdminCheck').click()">
                    <input type="checkbox" id="regAdminCheck" onclick="event.stopPropagation(); toggleAdminKey()" />
                    <label for="regAdminCheck" onclick="event.stopPropagation()">Register as Admin</label>
                </div>
                <div class="form-group secret-key-group" id="secretKeyGroup">
                    <label for="regSecretKey">Admin Secret Key</label>
                    <input type="password" id="regSecretKey" class="form-control"
                        placeholder="Enter admin secret key" />
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="registerBtn">Create Account →</button>
            </form>

        </div>
    </div>

    <div id="toast-container"></div>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
