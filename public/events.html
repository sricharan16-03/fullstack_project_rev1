<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Events — EventX</title>
    <meta name="description" content="Browse and search all upcoming events on EventX." />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="nav-logo"><span>🎫</span> EventX</a>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="events.html" class="active">Events</a></li>
            <li id="navHistory" style="display:none"><a href="history.html">My Bookings</a></li>
            <li id="navAdmin" style="display:none"><a href="admin.html">Dashboard</a></li>
            <li id="navLogin"><a href="login.html" class="nav-cta">Login</a></li>
            <li id="navLogout" style="display:none">
                <div class="nav-user">
                    <span class="nav-user-name" id="navUserName"></span>
                    <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
                </div>
            </li>
        </ul>
        <div class="hamburger" id="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div style="padding-top:66px;">

        
        <div class="page-header">
            <div class="container">
                <h1>Browse Events</h1>
                <p>Find and book tickets for the best events near you</p>
            </div>
        </div>

        <div class="section">
            <div class="container">

                
                <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:36px;align-items:center;">
                    <div class="search-bar" style="flex:1;min-width:240px;">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="searchInput" placeholder="Search events by name or venue…"
                            oninput="onSearch()" />
                    </div>
                    <select id="statusFilter" class="form-control" style="width:auto;min-width:150px;"
                        onchange="onSearch()">
                        <option value="">All Status</option>
                        <option value="upcoming">Upcoming</option>
                        <option value="ongoing">Ongoing</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>

             
                <p id="resultsCount" style="color:var(--text-muted);font-size:0.85rem;margin-bottom:20px;"></p>

               
                <div class="events-grid" id="eventsGrid">
                    <div class="loading-overlay">
                        <div class="spinner"></div><span>Loading events…</span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-logo">🎫 EventX</div>
            <p>Enjoy your event.</p>
        </div>
    </footer>

    <div id="toast-container"></div>
    <script src="js/main.js"></script>
    <script src="js/events.js"></script>
</body>

</html>
